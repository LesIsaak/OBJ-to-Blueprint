kind = "web"
previewPath = "/"
title = "OBJ Blueprint Maker"
version = "1.0.0"
id = "artifacts/obj-blueprint"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19774

[services.development]
run = "pnpm --filter @workspace/obj-blueprint run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/obj-blueprint", "run", "build" ]
publicDir = "artifacts/obj-blueprint/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19774"
BASE_PATH = "/"
